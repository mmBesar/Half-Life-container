# =============================================================================
# Half-Life Dedicated Server — Docker Compose
# https://github.com/mmBesar/Half-Life-container
#
# QUICK START:
#   1. Copy your Half-Life "valve" folder to ${CONTAINER_DIR}/half-life/valve/
#   2. Set your variables in a .env file (see below)
#   3. Run: docker compose up -d
#
# REQUIRED .env variables:
#   CONTAINER_DIR   — base path where game data lives  e.g. /opt/containers
#   PUID / PGID     — your user/group ID  (run: id)
#   TZ              — your timezone       e.g. Africa/Cairo
#   BASIC_PASSWORD  — RCON password
# =============================================================================

services:
  half-life:
    image: ghcr.io/mmbesar/half-life-container:latest
    container_name: half-life

    # ── Network ───────────────────────────────────────────────────────────────
    # host mode is recommended — avoids NAT issues with UDP game traffic.
    # To use bridge mode: comment out network_mode, uncomment ports block,
    # and uncomment the networks section at the bottom.
    network_mode: "host"
    # networks:
    #   - ${NETWORK}
    # ports:
    #   - "27015:27015/udp"  # main game port
    #   - "27005:27005/udp"  # client port
    #   - "27025:27025/udp"  # alternate query port
    #   - "47584:47584/udp"  # voice chat
    #   - "47584:47584/tcp"  # RCON / optional TCP

    restart: unless-stopped
    user: "${PUID}:${PGID}"

    # ── Volumes ───────────────────────────────────────────────────────────────
    # valve/       — required: copy from your Half-Life installation
    # cstrike/     — optional: Counter-Strike game files
    # dll/         — optional: custom game DLLs
    # logs/        — optional: persistent server logs
    # configs/     — optional: read-only extra configs
    # entrypoint   — optional: override the default entrypoint
    volumes:
      - ${CONTAINER_DIR}/half-life/valve:/data/valve
      - ${CONTAINER_DIR}/half-life/dll:/data/dll
      - ${CONTAINER_DIR}/half-life/cstrike:/data/cstrike
      - ${CONTAINER_DIR}/half-life/logs:/data/logs
      - ${CONTAINER_DIR}/half-life/configs:/data/configs:ro
      - ${CONTAINER_DIR}/half-life/entrypoint.sh:/usr/local/bin/entrypoint.sh

    environment:
      TZ: ${TZ}

      # ── Internal paths (only change if you know what you're doing) ─────────
      # XASH3D_BASE: /opt/xash
      # HLSDK_LIBS_PATH: /opt/hlsdk-libs

      # ── Server ────────────────────────────────────────────────────────────
      HLSERVER_GAME: valve          # Game mod directory: valve | cstrike | etc.
      HLSERVER_NAME: "Half-Life Server"  # Server name shown in browser
      HLSERVER_IP: 0.0.0.0          # Bind IP — 0.0.0.0 listens on all interfaces
      HLSERVER_PORT: 27015          # UDP port clients connect to
      HLSERVER_MAXPLAYERS: 16       # Max human + bot slots (max 32)
      HLSERVER_MAP: stalkyard       # Starting map
      HLSERVER_MAPCYCLE: stalkyard,gasworks,datacore  # Comma-separated map rotation
      HLSERVER_FRAGLIMIT: 20        # Frags to end the round (0 = disabled)
      HLSERVER_TIMELIMIT: 10        # Minutes per map        (0 = disabled)
      HLSERVER_TICRATE: 10          # Server tick rate — keep low on Pi / weak hardware
      HLSERVER_RCON_PASS: ${BASIC_PASSWORD}

      # ── Bots ──────────────────────────────────────────────────────────────
      # Uses botman's HPB Bot #10 integrated directly into the game DLL.
      # The DLL has NO runtime cvars — all control is via bot.cfg, which the
      # DLL reads and parses itself at startup (not the engine config system).
      HLSERVER_BOTS: true           # true | false
      HLSERVER_BOTS_COUNT: 8        # Total number of bots to spawn

      # Skill: 1=best (hardest to beat)  5=worst (easiest to beat)
      # Default in source code is 3. Applied to all bots unless overridden
      # per-bot via HLSERVER_BOT_NAMES (see below).
      HLSERVER_BOT_SKILL: 3

      # botdontshoot: 0 = bots shoot at enemies  1 = bots never shoot
      HLSERVER_BOT_DONTSHOOT: 0

      # min_bots: when a human joins, a bot is kicked to stay at or above
      # this floor. 0 = disabled (bots are never auto-kicked).
      HLSERVER_BOT_MIN: 0

      # max_bots: server auto-fills with bots up to this count.
      # 0 = disabled (only bot.cfg addbot commands are used).
      HLSERVER_BOT_MAX: 0

      # Bot names/skins — optional, comma-separated "skin:name" pairs.
      # Slots beyond the list use random skins and default names.
      #
      # Format:  "skin:name"  or  "skin"  or  ":name"
      # Valid skins: barney gina gman gordon helmet hgrunt recon robo scientist zombie
      #
      # Examples:
      #   "gordon:Freeman,barney:Calhoun"  — specific skin + custom name
      #   "gordon,barney,zombie"           — specific skins, default names
      #   ":Freeman,:Calhoun"              — random skins, custom names
      #   ""                               — all random (leave blank)
      HLSERVER_BOT_NAMES:

    # ── Resource limits ───────────────────────────────────────────────────────
    # Tuned for a Raspberry Pi 4 — remove or adjust for more powerful hardware
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

# networks:
#   your_network:
#     external: true
